# 既存の Ctrl+b を解除
unbind C-b
# 新しく Ctrl+a をプレフィックスに設定
set-option -g prefix C-a
# 新プレフィックス用に再バインド
bind-key C-a send-prefix



##### 基本設定 #####
set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set-option -g status-interval 5
set-option -g allow-rename off
set-option -sa terminal-overrides ',xterm-256color:Tc'



# Plugin 
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-copycat'
# set -g @plugin 'tmux-plugins/tmux-fingers'


##### TPM プラグインマネージャ #####
set -g @plugin 'tmux-plugins/tpm'

# === 検索・セッション管理 ===
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-sessionist'

# === パネル操作強化 ===
set -g @plugin 'tmux-plugins/tmux-pain-control'

# === ステータスバー情報 ===
# set -g @plugin 'tmux-plugins/tmux-cpu'
# set -g @plugin 'tmux-plugins/tmux-mem'

# === ロギング / 設定反映 ===
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'tmux-plugins/tmux-autoreload'

# === テーマ・UI ===
# set -g @plugin 'seebi/tmux-colors-solarized'
# set -g @plugin 'erikw/tmux-powerline'
# set -g @plugin 'wfxr/tmux-nerd-font-window-name'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-urlview'



##### キーバインド追加 #####
# fzfでセッション・ペイン選択
bind-key F run '~/.tmux/plugins/tmux-fzf/scripts/session.sh'
bind-key P run '~/.tmux/plugins/tmux-fzf/scripts/pane.sh'

# tmux-logging
bind-key L run '~/.tmux/plugins/tmux-logging/scripts/toggle_logging.sh'

##### 自動設定反映（autoreload） #####
set -g @tmux-autoreload 'on'

##### Nerd Font ウィンドウ表示（必要に応じて変更） #####
set -g @nerd_font_window_name_icons 'on'

##### tmux-powerline 起動用（テーマは必要に応じて変更） #####
set -g @tmux_powerline_theme 'default'
run-shell ~/.tmux-powerline/powerline.tmux








run '~/.tmux/plugins/tpm/tpm'

unbind Space

# マウスでのコピペ有効化
set -g mouse on

set-option -g set-clipboard on

bind -T copy-mode-vi y send -X copy-pipe-and-cancel "cat | osc52.sh"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "~/osc52.sh"


# 自動保存（任意）
set -g @resurrect-auto-save 'on'

# TPMのキー
bind r source-file ~/.tmux.conf \; run '~/.tmux/plugins/tpm/tpm'


# セッション一覧が出て、選ぶだけで即切替できる
bind-key s choose-session

# fzf インタラクティブな曖昧検索ツール. 
# 
bind-key C-f run-shell "tmux switch-client -t $(tmux list-sessions -F '#S' | fzf)"



# 自動保存・復元の有効化
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'  # 15分ごとに自動保存
